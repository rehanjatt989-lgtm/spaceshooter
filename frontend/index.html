<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
let tg;

/* ================================
   TELEGRAM OR BROWSER
================================ */
if (window.Telegram && window.Telegram.WebApp) {
  tg = window.Telegram.WebApp;
  console.log("Telegram mode");
} else {
  console.log("Browser test mode");

  tg = {
    initData: "user=" + encodeURIComponent(JSON.stringify({
      id: 11111,
      username: "testuser"
    })),
    initDataUnsafe: {
      user: { id: 11111, username: "testuser" }
    },
    expand: () => {}
  };
}

/* ================================
   START GAME IMMEDIATELY
================================ */
window.addEventListener("load", () => {
  tg.expand();

  console.log("🚀 Instant game start");
  init(); // START GAME WITHOUT WAITING

  // 🔥 call backend in background (no wait)
  startSessionBackground();
});

/* ================================
   BACKGROUND SESSION CALL
================================ */
async function startSessionBackground() {
  try {
    const res = await fetch(
      "https://spaceshooter-backend.onrender.com/api/start-session",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          initData: tg.initData
        })
      }
    );

    const data = await res.json();
    console.log("Session (background):", data);

    window.SESSION_TOKEN = data.sessionToken || null;

  } catch (err) {
    console.log("Backend skipped (demo mode)");
  }
}
</script>
