<body>

<div id="gameDiv"></div>

<!-- ===============================
   PHASER (FIXED PATH ✅)
=============================== -->
<script src="lib/phaser.min.js"></script>

<!-- ===============================
   YOUR GAME FILE
=============================== -->
<script src="js/main.js"></script>

<!-- ===============================
   TELEGRAM + BACKEND (FINAL)
=============================== -->
<script>
let tg;
let SESSION_TOKEN = null;
let GAME_STARTED = false;

const API_URL = "https://spaceshooter-backend.onrender.com";

/* ===============================
   LOAD TELEGRAM SAFELY
=============================== */
function loadTelegramScript() {
  return new Promise((resolve) => {
    const script = document.createElement("script");
    script.src = "https://telegram.org/js/telegram-web-app.js";
    script.async = true;

    script.onload = () => {
      console.log("✅ Telegram loaded");
      resolve(true);
    };

    script.onerror = () => {
      console.log("⚠ Telegram failed → browser mode");
      resolve(false);
    };

    document.head.appendChild(script);
  });
}

/* ===============================
   START APP
=============================== */
window.addEventListener("load", async () => {

  const telegramLoaded = await loadTelegramScript();

  if (telegramLoaded && window.Telegram && window.Telegram.WebApp) {
    tg = window.Telegram.WebApp;
    console.log("📱 Telegram mode");
  } else {
    console.log("🌐 Browser mode");

    tg = {
      initData: "user=" + encodeURIComponent(JSON.stringify({
        id: 99999,
        username: "browser_user"
      })),
      expand: () => {}
    };
  }

  try {
    if (tg.expand) tg.expand();
  } catch (e) {}

  startSession();
});

/* ===============================
   START SESSION
=============================== */
async function startSession() {
  try {
    console.log("🚀 Starting session...");

    const res = await fetch(API_URL + "/api/start-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        initData: tg.initData
      })
    });

    const data = await res.json();
    console.log("Session:", data);

    if (!data.success || !data.sessionToken) {
      alert("No plays available");
      return;
    }

    SESSION_TOKEN = data.sessionToken;

    startGame();

  } catch (err) {
    console.error("❌ Session error:", err);
    alert("Server error");
  }
}

/* ===============================
   START GAME
=============================== */
function startGame() {
  if (GAME_STARTED) return;

  GAME_STARTED = true;

  console.log("🎮 Starting game...");

  if (typeof init === "function") {
    init();
  } else {
    console.error("❌ init() not found → check main.js");
  }
}

/* ===============================
   SUBMIT SCORE
=============================== */
async function submitScore(score) {
  if (!SESSION_TOKEN) return;

  try {
    const res = await fetch(API_URL + "/api/score", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        initData: tg.initData,
        score: score,
        sessionToken: SESSION_TOKEN,
        playTime: 60
      })
    });

    const data = await res.json();
    console.log("🏆 Score:", data);

  } catch (err) {
    console.error("❌ Score error:", err);
  }
}
</script>

</body>
