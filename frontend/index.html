<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
let tg;
let USER = null;
let isStartingSession = false;

/* ================================
   🔍 DETECT TELEGRAM OR BROWSER
================================ */
if (window.Telegram && window.Telegram.WebApp) {
  tg = window.Telegram.WebApp;
  console.log("✅ Running inside Telegram");
} else {
  console.log("🌐 Running in browser (test mode)");

  // Fake user for browser testing
  tg = {
    initData: "user=" + encodeURIComponent(JSON.stringify({
      id: 11111,
      username: "testuser"
    })),
    initDataUnsafe: {
      user: {
        id: 11111,
        username: "testuser"
      }
    },
    expand: () => {},
    onEvent: () => {}
  };
}

/* ================================
   🚀 INIT APP
================================ */
async function initApp() {
  try {
    tg.expand();

    USER = tg.initDataUnsafe.user;
    console.log("👤 User:", USER);

    await startSession();

  } catch (err) {
    console.error("❌ Init error:", err);
  }
}

/* ================================
   🎮 START SESSION
================================ */
async function startSession() {
  if (isStartingSession) return;
  isStartingSession = true;

  try {
    console.log("🚀 Starting session...");

    const res = await fetch(
      "https://spaceshooter-backend.onrender.com/api/start-session",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          initData: tg.initData
        })
      }
    );

    const data = await res.json();

    console.log("🧠 SESSION RESPONSE:", data);

    if (!data.success) {
      console.warn("⚠️ No plays → allow anyway (dev mode)");

      // 🔥 TEMP FIX → allow game even if backend blocks
      startGame();
      return;
    }

    window.SESSION_TOKEN = data.sessionToken;

    console.log("✅ Session OK:", data.sessionToken);

    startGame();

  } catch (err) {
    console.error("❌ Session error:", err);

    // 🔥 fallback → still allow game
    startGame();
  } finally {
    isStartingSession = false;
  }
}

/* ================================
   🎮 START GAME
================================ */
function startGame() {
  console.log("🎮 Launching game...");
  init(); // your Phaser init()
}

/* ================================
   🚀 LOAD
================================ */
window.addEventListener("load", () => {
  initApp();
});
</script>
