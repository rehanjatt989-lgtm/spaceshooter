<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Space Shooter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body style="margin:0; background:black; overflow:hidden;">

<div id="gameDiv"></div>

<!-- ===============================
   PHASER ENGINE (CORRECT PATH)
=============================== -->
<script src="lib/phaser.min.js"></script>

<!-- ===============================
   YOUR GAME CODE (init() inside)
=============================== -->
<script src="js/main.js"></script>

<!-- ===============================
   TELEGRAM + BACKEND (FIXED)
=============================== -->
<script>
let tg = null;
let SESSION_TOKEN = null;
let GAME_STARTED = false;

const API_URL = "https://spaceshooter-backend.onrender.com";

/* ===============================
   SAFE TELEGRAM LOAD
=============================== */
async function initTelegram() {
  try {
    const script = document.createElement("script");
   
    script.async = true;

    await new Promise((resolve, reject) => {
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });

    if (window.Telegram && window.Telegram.WebApp) {
      tg = window.Telegram.WebApp;
      console.log("📱 Telegram mode");
      return;
    }

  } catch (e) {
    console.log("⚠ Telegram failed, using browser mode");
  }

  // ✅ Browser fallback (VERY IMPORTANT)
  tg = {
    initData: "user=" + encodeURIComponent(JSON.stringify({
      id: 99999,
      username: "browser_user"
    })),
    expand: () => {}
  };

  console.log("🌐 Browser mode");
}

/* ===============================
   START APP
=============================== */
window.onload = async () => {
  await initTelegram();

  try {
    tg.expand();
  } catch (e) {}

  startSession();
};

/* ===============================
   START SESSION
=============================== */
async function startSession() {
  try {
    console.log("🚀 Starting session...");

    const res = await fetch(API_URL + "/api/start-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        initData: tg.initData
      })
    });

    const data = await res.json();
    console.log("Session:", data);

    if (!data.success) {
      alert("No plays available");
      return;
    }

    SESSION_TOKEN = data.sessionToken;
    startGame();

  } catch (err) {
    console.error("❌ Session error:", err);
  }
}

/* ===============================
   START GAME
=============================== */
function startGame() {
  if (GAME_STARTED) return;
  GAME_STARTED = true;

  console.log("🎮 Launching game...");

  if (typeof init === "function") {
    init(); // Phaser starts here
  } else {
    console.error("❌ init() not found");
  }
}

/* ===============================
   SUBMIT SCORE
=============================== */
async function submitScore(score) {
  if (!SESSION_TOKEN) return;

  try {
    await fetch(API_URL + "/api/score", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        initData: tg.initData,
        score: score,
        sessionToken: SESSION_TOKEN,
        playTime: 60
      })
    });

    console.log("🏆 Score sent");

  } catch (err) {
    console.error("❌ Score error:", err);
  }
}
</script>

</body>
</html>
