<body>

<div id="gameDiv"></div>

<!-- PHASER -->
<script src="lib/phaser.min.js"></script>

<!-- GAME -->
<script src="js/main.js"></script>

<!-- DEBUG CHECK -->
<script>
console.log("Phaser:", typeof Phaser);
console.log("init function:", typeof init);
</script>

<!-- TELEGRAM SAFE -->
<script>
let tg;

window.addEventListener("load", () => {

  if (window.Telegram && window.Telegram.WebApp) {
    tg = window.Telegram.WebApp;
    console.log("Telegram mode");
  } else {
    console.log("Browser mode");

    tg = {
      initData: "user=" + encodeURIComponent(JSON.stringify({
        id: 99999,
        username: "browser_user"
      })),
      expand: () => {}
    };
  }

  try { tg.expand(); } catch {}

  // 🔥 IMPORTANT: START GAME DIRECTLY (TEST)
  if (typeof init === "function") {
    init();
  } else {
    console.error("init() missing");
  }

});
</script>

</body>
