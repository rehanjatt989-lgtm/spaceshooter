<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
let tg;
let SESSION_TOKEN = null;
let GAME_STARTED = false;

const API_URL = "https://spaceshooter-backend.onrender.com";

/* ===============================
   TELEGRAM OR BROWSER (SAFE)
=============================== */
if (window.Telegram && window.Telegram.WebApp) {
  tg = window.Telegram.WebApp;
  console.log("Telegram mode");
} else {
  console.log("Browser fallback mode");

  tg = {
    initData: "user=" + encodeURIComponent(JSON.stringify({
      id: 99999,
      username: "browser_user"
    })),
    initDataUnsafe: {
      user: { id: 99999, username: "browser_user" }
    },
    expand: () => {}
  };
}

/* ===============================
   START APP
=============================== */
window.addEventListener("load", () => {
  try {
    if (tg && tg.expand) {
      tg.expand();
    }
  } catch (e) {
    console.log("Expand skipped");
  }

  startSession();
});

/* ===============================
   START SESSION (NON-BLOCKING)
=============================== */
async function startSession() {
  try {
    console.log("Starting session...");

    const res = await fetch(API_URL + "/api/start-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        initData: tg.initData
      })
    });

    const data = await res.json();
    console.log("Session response:", data);

    if (data.success && data.sessionToken) {
      SESSION_TOKEN = data.sessionToken;
    } else {
      console.warn("No session available, starting anyway");
    }

  } catch (err) {
    console.error("Session error:", err);
  }

  // ✅ ALWAYS START GAME (IMPORTANT FIX)
  startGame();
}

/* ===============================
   START GAME
=============================== */
function startGame() {
  if (GAME_STARTED) return;
  GAME_STARTED = true;

  console.log("Launching game...");
  init(); // Phaser start
}

/* ===============================
   SUBMIT SCORE
=============================== */
async function submitScore(score) {
  if (!SESSION_TOKEN) {
    console.warn("No session token, skipping score submit");
    return;
  }

  try {
    const playTime = 60;

    const res = await fetch(API_URL + "/api/score", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        initData: tg.initData,
        score: score,
        sessionToken: SESSION_TOKEN,
        playTime: playTime
      })
    });

    const data = await res.json();
    console.log("Score response:", data);

  } catch (err) {
    console.error("Score error:", err);
  }
}
</script>
